<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>
    <style>
        /* Mengatur tampilan dasar halaman */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Menggunakan min-height agar responsive */
            margin: 0;
            color: #333;
            padding: 20px; /* Jarak aman untuk HP */
        }

        /* Kartu ucapan di tengah layar */
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* --- CSS UNTUK FOTO --- */
        .profile-pic {
            width: 150px; /* Lebar foto */
            height: 150px; /* Tinggi foto harus sama agar bulat sempurna */
            border-radius: 50%; /* Membuat foto jadi bulat */
            object-fit: cover; /* Agar gambar tidak gepeng */
            border: 5px solid #ff6b81; /* Bingkai warna pink */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); /* Bayangan halus */
            margin-bottom: 20px; /* Jarak ke teks di bawahnya */
        }
        /* --------------------- */

        .cake {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            animation: bounce 2s infinite;
        }

        h1 {
            color: #ff6b81;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }

        /* Tombol interaktif */
        .btn {
            background-color: #ff6b81;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none; /* Jika nanti diubah jadi link */
            display: inline-block;
        }

        .btn:hover {
            background-color: #ff4757;
            transform: scale(1.05); /* Sedikit membesar saat di-hover */
        }

        /* Animasi sederhana untuk kue */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="7938fa101ac9c591a3b610aa5ba405f0.jpg" alt="Foto Ulang Tahun" class="profile-pic">

        <div class="cake">🎂✨</div>
        
        <h1>Happy Birthday Sayanagkuuu!</h1> 
        
        <p>Selamat bertambah usia! Semoga di tahun yang baru ini kamu selalu diberikan kesehatan, kebahagiaan, dan semua impianmu bisa segera terwujud. Terima kasih sudah menjadi orang yang luar biasa!</p>
        
        <button class="btn" onclick="alert('Make a wish! 🎈🎉')">Tiup Lilin & Taruh Harapan</button>
    </div>

</body>
</html>
